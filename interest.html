<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 40px; text-align: center; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 400px; margin: auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        h2 { color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #27ae60; }
        .result { margin-top: 20px; font-weight: bold; font-size: 18px; color: #2c3e50; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>💰 Simple Interest Calculator</h2>
    <input type="number" id="principal" placeholder="Enter Principal (P)">
    <input type="number" id="rate" placeholder="Enter Rate of Interest (R)">
    <input type="number" id="time" placeholder="Enter Time in Years (T)">
    <button onclick="calculate()">Calculate Interest</button>

    <div class="result" id="output"></div>
</div>

<script>
    function calculate() {
        const p = document.getElementById('principal').value;
        const r = document.getElementById('rate').value;
        const t = document.getElementById('time').value;

        if(!p || !r || !t) {
            document.getElementById('output').innerHTML = "⚠️ Please fill all fields!";
            return;
        }

        // Backend API-ku data anuprom
        fetch('/calculate-interest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ principal: p, rate: r, time: t })
        })
        .then(res => res.json())
        .then(data => {
            if(data.error) {
                document.getElementById('output').innerHTML = "❌ " + data.error;
            } else {
                document.getElementById('output').innerHTML = `
                    💵 Interest: ₹${data.interest}<br>
                    📈 Total Amount: ₹${data.total_amount}
                `;
            }
        })
        .catch(err => {
            document.getElementById('output').innerHTML = "❌ Error connecting to server!";
        });
    }
</script>

</body>
</html>
